# ============================================
# APPLICATION BASICS
# ============================================
spring.application.name=AutomationScriptCreator
server.port=8080
spring.main.banner-mode=off
spring.output.ansi.enabled=ALWAYS
spring.main.allow-bean-definition-overriding=true

# ============================================
# FILE STORAGE PATHS
# ============================================
automation.script.output-dir=./generated-scripts
automation.recordings.dir=./recordings
playwright.test.dir=./generated-playwright-tests
playwright.report.dir=./playwright-report
playwright.results.dir=./test-results

# ============================================
# BROWSER & PLAYWRIGHT CONFIGURATION
# ============================================
# Chrome Driver (Update for your OS)
webdriver.chrome.driver=/usr/local/bin/chromedriver

# Browser Settings
automation.browser.headless=true
automation.browser.timeout=30
automation.browser.max-sessions=10
automation.browser.lazy-init=true

# Playwright Settings
playwright.browser.headless=true
playwright.browser.viewport.width=1920
playwright.browser.viewport.height=1080
playwright.browser.lazy-init=true
playwright.mcp.enabled=true
playwright.mcp.url=http://localhost:3000

# ============================================
# AI CONFIGURATION (Ollama)
# ============================================
ai.enabled=true

# Ollama Configuration (Spring AI 0.8.x format)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama2
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.top-p=0.9
spring.ai.ollama.chat.options.num-predict=1024

# AI Enhancement Limits
# 0 = NO LIMIT (enhance ALL tests)
ai.enhancement.limit-single=1
ai.enhancement.limit-all=0
ai.enhancement.limit-fast=0
ai.enhancement.limit-playwright=5

# AI Safety Limits (prevent overload)
ai.enhancement.max-total-test-cases=100
ai.enhancement.max-ai-tests-per-request=50
ai.enhancement.max-concurrent-ai-requests=10
ai.enhancement.batch-size=5
ai.enhancement.timeout-ms=60000
ai.enhancement.min-elements-for-ai=3
ai.enhancement.max-elements-for-ai=100

# ============================================
# TEST GENERATION
# ============================================
test.generation.max-elements=0      # 0 = all elements
test.generation.max-tests=0         # 0 = no limit
test.generation.ai-enhance-all=true

# ============================================
# EXECUTION TIMEOUTS (in milliseconds)
# ============================================
playwright.execution.timeout=300000  # 5 minutes
playwright.installation.timeout=120000  # 2 minutes
test.generation.timeout=600000       # 10 minutes (for unlimited AI)

# ============================================
# SESSION & MEMORY MANAGEMENT
# ============================================
server.servlet.session.timeout=60m
server.servlet.session.cookie.max-age=60m

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Tomcat settings
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-form-post-size=10MB
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# ============================================
# DATABASE (H2 in-memory - optional)
# ============================================
# Uncomment if you need persistent storage
# spring.datasource.url=jdbc:h2:file:./data/automationdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.hibernate.ddl-auto=update
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.com.pxbtdev=INFO
logging.level.com.pxbtdev.service.TestCaseGeneratorService=DEBUG
logging.level.com.pxbtdev.service.SimpleOllamaService=DEBUG
logging.level.com.pxbtdev.service.AITestEnhancerService=DEBUG
logging.level.org.springframework.ai=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot.autoconfigure=WARN
logging.level.org.springframework.ai.chat.client=DEBUG

# Console logging pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level [%thread] %logger{36} - %msg%n

# File logging (uncomment to enable)
# logging.file.name=./logs/automation.log
# logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %-5level [%thread] %logger{36} - %msg%n
# logging.logback.rollingpolicy.max-file-size=10MB
# logging.logback.rollingpolicy.max-history=30

# ============================================
# CORS & WEB CONFIGURATION
# ============================================
# CORS settings (already configured in WebConfig.java)
# These are just for reference
# cors.allowed-origins=http://localhost:8080,http://127.0.0.1:8080
# cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
# cors.allowed-headers=*
# cors.allow-credentials=true

# ============================================
# STATIC RESOURCES
# ============================================
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/,file:./generated-playwright-tests/,file:./playwright-report/,file:./test-results/,file:./generated-scripts/
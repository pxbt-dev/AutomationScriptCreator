spring.application.name=fibonacciTimeTrader
server.port=${PORT:8080}


# Binance API endpoints
binance.api.base-url=https://api.binance.com/api/v3
binance.api.klines-endpoint=${binance.api.base-url}/klines
binance.api.klines-query-params=?symbol={symbol}&interval={interval}&limit={limit}

# Binance API noise
logging.level.com.pxbt.dev.fibonacciTimeTrader.Gateway=INFO

# Enable metrics distribution for percentiles
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Configure specific percentiles
management.metrics.distribution.percentiles.http.server.requests=0.5,0.75,0.95,0.99

# Enhanced metrics exposure
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.build.enabled=true
management.info.git.enabled=true

# CORS:
management.endpoints.web.cors.allowed-origins=*
management.endpoints.web.cors.allowed-methods=GET,OPTIONS

# NOAA API Endpoints (CORRECT ONES)
noaa.solar.forecast-url=https://services.swpc.noaa.gov/products/45-day-ap-forecast.txt
noaa.solar.kp-realtime-url=https://services.swpc.noaa.gov/products/noaa-planetary-k-index-1-hour.json
noaa.solar.flux-realtime-url=https://services.swpc.noaa.gov/json/radio_flux_27_day.json

# Optional: Additional endpoints
noaa.solar.geomagnetic-forecast=https://services.swpc.noaa.gov/products/geospace/probabilities.json
noaa.solar.solar-wind=https://services.swpc.noaa.gov/products/summary/solar-wind-speed.json
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=6h

# ===== LOGGING CONFIGURATION =====
# Spring Boot startup banner
spring.main.banner-mode=console

# Log levels
logging.level.root=INFO
logging.level.com.pxbt.dev=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.boot=INFO

# Log file (optional)
logging.file.name=logs/fibonacci-trader.log
logging.file.max-size=10MB
logging.file.max-history=7

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %5p [%15.15t] %-40.40logger{39} : %m%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %5p [%15.15t] %-40.40logger{39} : %m%n


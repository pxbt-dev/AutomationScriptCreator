# ============================================
# APPLICATION BASICS
# ============================================
spring.application.name=AutomationScriptCreator
server.port=8080
spring.main.banner-mode=off
spring.output.ansi.enabled=ALWAYS
spring.main.allow-bean-definition-overriding=true

# ============================================
# FILE STORAGE PATHS
# ============================================
automation.script.output-dir=./generated-scripts
playwright.test.dir=./generated-playwright-tests
playwright.report.dir=./playwright-report
playwright.results.dir=./test-results

# ============================================
# PLAYWRIGHT CONFIGURATION
# ============================================
playwright.browser.headless=true
playwright.browser.viewport.width=1920
playwright.browser.viewport.height=1080
playwright.execution.timeout=300000

# ============================================
# OLLAMA AI CONFIGURATION
# ============================================
ollama.enabled=true
ollama.base-url=http://localhost:11434
ollama.model=qwen2.5-coder:7b
ollama.fallback-model=phi3:mini
ollama.timeout-seconds=60
ollama.max-tokens=2048

# ============================================
# SESSION & MEMORY MANAGEMENT
# ============================================
server.servlet.session.timeout=60m
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Tomcat settings
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-form-post-size=10MB
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.com.pxbtdev=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot.autoconfigure=WARN
logging.pattern.console=%d{HH:mm:ss} %highlight(%-5level) [%thread] %cyan(%logger{20}) - %msg%n

# ============================================
# CORS & WEB CONFIGURATION
# ============================================
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/,file:./generated-playwright-tests/,file:./playwright-report/,file:./test-results/,file:./generated-scripts/

# Needed for OpenAPI spec fetching (disable SSL checking for internal APIs)
spring.webflux.codecs.max-in-memory-size=10MB
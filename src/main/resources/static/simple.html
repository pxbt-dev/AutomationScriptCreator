<!DOCTYPE html>
<html lang="en">
<head>
    <title>Simple Test</title>
    <style>
        body { padding: 20px; font-family: Arial,serif; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
    </style>
</head>
<body>
<h1>API Connection Test</h1>
<div id="results"></div>en

<script>
    const baseUrl = 'http://localhost:8080';
    const results = document.getElementById('results');

    async function testEndpoint(name, url, method = 'GET', body = null) {
        const div = document.createElement('div');
        div.className = 'result';
        div.innerHTML = `<strong>${name}:</strong> Testing...`;
        results.appendChild(div);

        try {
            const options = { method };
            if (body) {
                options.headers = { 'Content-Type': 'application/json' };
                options.body = JSON.stringify(body);
            }

            const response = await fetch(url, options);
            const status = `${response.status} ${response.statusText}`;

            let content;
            try {
                content = await response.json();
            } catch {
                content = await response.text();
            }

            div.className += ' success';
            div.innerHTML = `
                    <strong>${name}:</strong> ${status}<br>
                    <pre>${JSON.stringify(content, null, 2)}</pre>
                `;

            return { success: true, data: content };
        } catch (error) {
            div.className += ' error';
            div.innerHTML = `
                    <strong>${name}:</strong> ERROR<br>
                    ${error.message}
                `;
            return { success: false, error };
        }
    }

    async function runAllTests() {
        const tests = [
            ['Health', `${baseUrl}/api/v1/health`],
            ['AI Test', `${baseUrl}/api/v1/ai/test`],
            ['Info', `${baseUrl}/api/v1/info`],
            ['Analyze', `${baseUrl}/api/v1/elements/analyze?url=https://example.com`]
        ];

        for (const [name, url] of tests) {
            await testEndpoint(name, url);
        }
    }

    // Run tests
    runAllTests();
</script>
</body>
</html>
